<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FizzBuzz 2.0</title>
  <link rel="stylesheet" href="style.css?v=2">

</head>

<body>

  <!-- START SCREEN -->
  <div id="start-screen" class="start-screen">
    <h1 class="start-title">FizzBuzz 2.0</h1>
    <button id="start-btn" class="start-btn">Start Game</button>
  </div>

  <!-- MAIN GAME CONTAINER -->
  <div class="fbz-container">

    <!-- HEADER -->
    <div class="fbz-header">
      <div class="score-box">Score: <span id="score">0</span></div>
      <div class="streak-box">Streak: <span id="streak">0</span></div>
      <div class="timer-box">Time: <span id="timer">30</span>s</div>

      <button id="reset-btn" class="reset-btn">Reset</button>
      <button id="pause-btn" class="pause-btn">Pause</button>

    </div>

    <!-- NUMBER DISPLAY -->
    <div class="fbz-number-box">
      <div id="number-display" class="number-display">1</div>
      <div id="feedback" class="feedback"></div>
    </div>

    <!-- BUTTONS -->
    <div class="fbz-buttons">
      <button id="fizz-btn" class="fbz-btn fizz">Fizz</button>
      <button id="buzz-btn" class="fbz-btn buzz">Buzz</button>
      <button id="fizzbuzz-btn" class="fbz-btn fizzbuzz">FizzBuzz</button>
    </div>

  </div>

  <!-- AUDIO -->
  <audio id="sfx-correct" src="correct.wav" preload="auto"></audio>
  <audio id="sfx-wrong" src="wrong.wav" preload="auto"></audio>
  <audio id="sfx-click" src="click.wav" preload="auto"></audio>

  <script src="script.js?v=2"></script>

</body>
</html>
